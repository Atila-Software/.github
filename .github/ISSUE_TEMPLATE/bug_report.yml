name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for the team to reproduce and investigate it.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the exact steps needed to reproduce the problem.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant environment details.
      placeholder: |
        - App version:
        - Device / OS:
        - Browser:
        - Backend / API version:
        - Database:
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or videos
      description: Add screenshots, videos, or logs if they help explain the problem.
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this issue?
      options:
        - Low - minor issue or cosmetic problem
        - Medium - affects normal usage but has a workaround
        - High - blocks important workflows
        - Critical - production outage, data loss, or security risk
    validations:
      required: true

